name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    # Needs a runner with iOS 26 simulators (deployment target is 26.1).
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          sudo xcode-select -s $(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          xcodebuild -version

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: List available simulators
        run: xcrun simctl list devices available | grep -E "iPhone [0-9]" | head -10

      - name: Build for testing
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project ItunesSearchApp.xcodeproj \
            -scheme ItunesSearchApp \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=latest' \
            -derivedDataPath DerivedData \
            | xcpretty

      - name: Run tests
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project ItunesSearchApp.xcodeproj \
            -scheme ItunesSearchApp \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=latest' \
            -derivedDataPath DerivedData \
            -resultBundlePath TestResults.xcresult \
            | xcpretty --report junit --output test-report.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            TestResults.xcresult
            test-report.xml
          retention-days: 7
